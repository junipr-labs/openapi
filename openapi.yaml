openapi: 3.1.0
info:
  title: Junipr API
  version: 1.0.0
  description: |
    Web intelligence APIs for developers. Screenshot capture, PDF generation,
    and metadata extraction — one API key, production-ready in 3 minutes.
  contact:
    name: Junipr Support
    email: jesse@junipr.io
    url: https://junipr.io
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

servers:
  - url: https://api.junipr.io
    description: Production

security:
  - apiKey: []

tags:
  - name: Screenshot
    description: Capture pixel-perfect screenshots of any URL
  - name: PDF
    description: Convert URLs or raw HTML to PDF documents
  - name: Metadata
    description: Extract rich metadata from any URL
  - name: Keys
    description: Self-service API key provisioning
  - name: Health
    description: Service health checks

paths:
  /v1/screenshot:
    post:
      operationId: captureScreenshot
      summary: Capture a screenshot
      description: |
        Capture a pixel-perfect screenshot of any URL. Supports full-page capture,
        device emulation, cookie banner blocking, and custom viewports.
      tags: [Screenshot]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ScreenshotRequest'
            examples:
              basic:
                summary: Basic screenshot
                value:
                  url: https://example.com
                  format: png
              fullPage:
                summary: Full-page mobile screenshot
                value:
                  url: https://stripe.com
                  format: webp
                  quality: 90
                  full_page: true
                  device: mobile
                  block_banners: true
      responses:
        '200':
          description: Screenshot image
          headers:
            X-Cache:
              schema:
                type: string
                enum: [HIT, MISS]
              description: Whether the response was served from cache
            X-RateLimit-Limit:
              $ref: '#/components/headers/X-RateLimit-Limit'
            X-RateLimit-Remaining:
              $ref: '#/components/headers/X-RateLimit-Remaining'
            X-RateLimit-Reset:
              $ref: '#/components/headers/X-RateLimit-Reset'
          content:
            image/png:
              schema:
                type: string
                format: binary
            image/jpeg:
              schema:
                type: string
                format: binary
            image/webp:
              schema:
                type: string
                format: binary
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/SsrfBlocked'
        '429':
          $ref: '#/components/responses/RateLimited'
        '502':
          $ref: '#/components/responses/RenderFailed'
        '503':
          $ref: '#/components/responses/QueueFull'
        '504':
          $ref: '#/components/responses/Timeout'

  /v1/pdf:
    post:
      operationId: generatePdf
      summary: Generate a PDF
      description: |
        Convert any URL or raw HTML to PDF. Supports custom margins, headers/footers,
        landscape mode, and multiple page formats (A4, Letter, Legal, etc.).
      tags: [PDF]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PdfRequest'
            examples:
              fromUrl:
                summary: PDF from URL
                value:
                  url: https://example.com/invoice
                  format: A4
                  print_background: true
              fromHtml:
                summary: PDF from HTML
                value:
                  html: '<h1>Hello World</h1><p>Generated by Junipr</p>'
                  format: Letter
                  margin:
                    top: 2cm
                    bottom: 2cm
              withHeaders:
                summary: PDF with header/footer
                value:
                  url: https://example.com/report
                  format: A4
                  landscape: true
                  header: '<div style="font-size:10px;text-align:center;">Confidential</div>'
                  footer: '<div style="font-size:10px;text-align:center;">Page <span class="pageNumber"></span> of <span class="totalPages"></span></div>'
      responses:
        '200':
          description: PDF document
          headers:
            X-Cache:
              schema:
                type: string
                enum: [HIT, MISS]
            X-RateLimit-Limit:
              $ref: '#/components/headers/X-RateLimit-Limit'
            X-RateLimit-Remaining:
              $ref: '#/components/headers/X-RateLimit-Remaining'
            X-RateLimit-Reset:
              $ref: '#/components/headers/X-RateLimit-Reset'
          content:
            application/pdf:
              schema:
                type: string
                format: binary
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/SsrfBlocked'
        '429':
          $ref: '#/components/responses/RateLimited'
        '502':
          $ref: '#/components/responses/RenderFailed'
        '503':
          $ref: '#/components/responses/QueueFull'
        '504':
          $ref: '#/components/responses/Timeout'

  /v1/metadata:
    get:
      operationId: extractMetadata
      summary: Extract page metadata
      description: |
        Extract rich metadata from any URL including Open Graph tags, Twitter Cards,
        JSON-LD structured data, favicons, and language detection.
      tags: [Metadata]
      parameters:
        - name: url
          in: query
          required: true
          description: URL to extract metadata from
          schema:
            type: string
            format: uri
          example: https://stripe.com
        - name: cache
          in: query
          required: false
          description: Set to `false` to skip cache and fetch fresh data
          schema:
            type: string
            default: 'true'
            enum: ['true', 'false']
      responses:
        '200':
          description: Extracted metadata
          headers:
            X-Cache:
              schema:
                type: string
                enum: [HIT, MISS]
            X-RateLimit-Limit:
              $ref: '#/components/headers/X-RateLimit-Limit'
            X-RateLimit-Remaining:
              $ref: '#/components/headers/X-RateLimit-Remaining'
            X-RateLimit-Reset:
              $ref: '#/components/headers/X-RateLimit-Reset'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MetadataResponse'
              example:
                url: https://stripe.com
                title: 'Stripe | Financial Infrastructure for the Internet'
                description: 'Stripe powers online and in-person payment processing...'
                og:
                  title: Stripe
                  description: Financial infrastructure for the internet.
                  image: https://stripe.com/img/v3/home/social.png
                  type: website
                  site_name: Stripe
                  url: https://stripe.com
                twitter:
                  card: summary_large_image
                  title: Stripe
                  description: Financial infrastructure for the internet.
                  image: https://stripe.com/img/v3/home/social.png
                  site: '@stripe'
                  creator: null
                favicon: https://stripe.com/favicon.ico
                canonical: https://stripe.com
                language: en
                structured_data:
                  - '@context': https://schema.org
                    '@type': Organization
                    name: Stripe
                response_time_ms: 342
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/SsrfBlocked'
        '429':
          $ref: '#/components/responses/RateLimited'
        '504':
          $ref: '#/components/responses/Timeout'

  /v1/keys/free:
    post:
      operationId: createFreeKey
      summary: Get a free API key
      description: |
        Self-service free API key provisioning. Sends a free-tier API key
        (500 calls/month, 10 req/min) to the provided email address.
        Limited to one active free key per email.
      tags: [Keys]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FreeKeyRequest'
            example:
              email: dev@example.com
      responses:
        '200':
          description: Key created and emailed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FreeKeyResponse'
              example:
                success: true
                message: API key sent to your email. Check your inbox.
        '400':
          $ref: '#/components/responses/BadRequest'
        '429':
          description: Rate limited — free key already exists or recently issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: true
                code: RATE_LIMIT_EXCEEDED
                message: An active free key already exists for this email. Check your inbox or upgrade to a paid plan.
                request_id: req-abc123
        '500':
          $ref: '#/components/responses/InternalError'

  /health:
    get:
      operationId: healthCheck
      summary: Health check
      description: Returns service health status, uptime, and resource usage.
      tags: [Health]
      security: []
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
              example:
                status: ok
                uptime: 86400
                memory_mb: 102
                heap_mb: 45
                active_jobs: 0
                queue_depth: 0
                cache_hit_rate: 73.2
                cpus: 5
                version: 1.0.0

components:
  securitySchemes:
    apiKey:
      type: apiKey
      in: header
      name: X-API-Key
      description: |
        Your Junipr API key (starts with `jnpr_`). Get one free at
        [junipr.io/pricing](https://junipr.io/#pricing) or via the
        `/v1/keys/free` endpoint.

  headers:
    X-RateLimit-Limit:
      description: Maximum requests allowed per minute
      schema:
        type: integer
    X-RateLimit-Remaining:
      description: Requests remaining in the current window
      schema:
        type: integer
    X-RateLimit-Reset:
      description: Unix timestamp (seconds) when the rate limit resets
      schema:
        type: integer

  schemas:
    ScreenshotRequest:
      type: object
      required: [url]
      properties:
        url:
          type: string
          format: uri
          description: URL to capture
        width:
          type: integer
          minimum: 320
          maximum: 3840
          default: 1280
          description: Viewport width in pixels
        height:
          type: integer
          minimum: 240
          maximum: 2160
          default: 720
          description: Viewport height in pixels
        format:
          type: string
          enum: [png, jpeg, webp]
          default: png
          description: Output image format
        quality:
          type: integer
          minimum: 1
          maximum: 100
          default: 80
          description: Compression quality (jpeg/webp only)
        full_page:
          type: boolean
          default: false
          description: Capture full scrollable page
        block_banners:
          type: boolean
          default: false
          description: Attempt to block cookie banners and popups
        wait_for:
          type: string
          description: CSS selector to wait for before capturing
        delay:
          type: integer
          minimum: 0
          maximum: 10000
          default: 0
          description: Additional delay in milliseconds after page load
        device:
          type: string
          enum: [desktop, mobile, tablet]
          default: desktop
          description: Device emulation preset
        cache:
          type: boolean
          default: true
          description: Use cached result if available

    PdfRequest:
      type: object
      description: Provide either `url` or `html` (not both).
      properties:
        url:
          type: string
          format: uri
          description: URL to convert to PDF
        html:
          type: string
          description: Raw HTML string to convert to PDF
        format:
          type: string
          enum: [A4, Letter, Legal, Tabloid, A3, A5]
          default: A4
          description: Page format
        margin:
          type: object
          description: Page margins (CSS units)
          properties:
            top:
              type: string
              default: 1cm
            right:
              type: string
              default: 1cm
            bottom:
              type: string
              default: 1cm
            left:
              type: string
              default: 1cm
        landscape:
          type: boolean
          default: false
          description: Use landscape orientation
        print_background:
          type: boolean
          default: true
          description: Include background colors and images
        header:
          type: string
          description: HTML template for page header
        footer:
          type: string
          description: HTML template for page footer
        cache:
          type: boolean
          default: true
          description: Use cached result if available

    MetadataResponse:
      type: object
      properties:
        url:
          type: string
          description: Final URL after redirects
        title:
          type: string
          nullable: true
        description:
          type: string
          nullable: true
        og:
          type: object
          properties:
            title:
              type: string
              nullable: true
            description:
              type: string
              nullable: true
            image:
              type: string
              nullable: true
            type:
              type: string
              nullable: true
            site_name:
              type: string
              nullable: true
            url:
              type: string
              nullable: true
        twitter:
          type: object
          properties:
            card:
              type: string
              nullable: true
            title:
              type: string
              nullable: true
            description:
              type: string
              nullable: true
            image:
              type: string
              nullable: true
            site:
              type: string
              nullable: true
            creator:
              type: string
              nullable: true
        favicon:
          type: string
          nullable: true
          description: Resolved absolute URL to favicon
        canonical:
          type: string
          nullable: true
        language:
          type: string
          nullable: true
          description: Detected page language
        structured_data:
          type: array
          items: {}
          description: Parsed JSON-LD objects
        response_time_ms:
          type: number
          description: Time to fetch and parse in milliseconds

    FreeKeyRequest:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email
          description: Email address to send the API key to

    FreeKeyResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string

    HealthResponse:
      type: object
      properties:
        status:
          type: string
          enum: [ok]
        uptime:
          type: number
          description: Seconds since process started
        memory_mb:
          type: number
        heap_mb:
          type: number
        active_jobs:
          type: integer
        queue_depth:
          type: integer
        cache_hit_rate:
          type: number
        cpus:
          type: integer
        version:
          type: string

    ErrorResponse:
      type: object
      required: [error, code, message, request_id]
      properties:
        error:
          type: boolean
          const: true
        code:
          type: string
          enum:
            - INVALID_API_KEY
            - RATE_LIMIT_EXCEEDED
            - QUOTA_EXCEEDED
            - INVALID_URL
            - SSRF_BLOCKED
            - TIMEOUT
            - RENDER_FAILED
            - INVALID_PARAMS
            - INTERNAL_ERROR
            - QUEUE_FULL
        message:
          type: string
          description: Human-readable error message
        request_id:
          type: string
          description: Unique request identifier for debugging

  responses:
    BadRequest:
      description: Invalid request parameters
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error: true
            code: INVALID_PARAMS
            message: 'Invalid request: url is required'
            request_id: req-abc123

    Unauthorized:
      description: Missing or invalid API key
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error: true
            code: INVALID_API_KEY
            message: Invalid or missing API key
            request_id: req-abc123

    SsrfBlocked:
      description: URL blocked by SSRF protection
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error: true
            code: SSRF_BLOCKED
            message: URL resolves to a private IP address
            request_id: req-abc123

    RateLimited:
      description: Rate limit or quota exceeded
      headers:
        Retry-After:
          schema:
            type: integer
          description: Seconds to wait before retrying
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error: true
            code: RATE_LIMIT_EXCEEDED
            message: Rate limit exceeded. Upgrade your plan for higher limits.
            request_id: req-abc123

    RenderFailed:
      description: Browser rendering failed
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error: true
            code: RENDER_FAILED
            message: Failed to render page
            request_id: req-abc123

    QueueFull:
      description: Service at capacity
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error: true
            code: QUEUE_FULL
            message: Service is at capacity. Please retry in a few seconds.
            request_id: req-abc123

    Timeout:
      description: Request timed out
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error: true
            code: TIMEOUT
            message: Request timed out after 45 seconds
            request_id: req-abc123

    InternalError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error: true
            code: INTERNAL_ERROR
            message: An unexpected error occurred
            request_id: req-abc123
